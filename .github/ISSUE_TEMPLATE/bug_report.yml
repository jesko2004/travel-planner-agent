name: 缺陷报告
description: 报告可复现的问题
title: "[缺陷] "
labels: ["bug"]
body:
  - type: textarea
    id: symptom
    attributes:
      label: 问题现象
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      placeholder: "1. 打开…\n2. 输入…\n3. 点击…"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 环境
      description: Windows、Python、Node、浏览器版本；不要粘贴 API Key。
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 日志和截图中不包含 API Key、身份证、支付信息或平台账号凭证。
          required: true

