name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile
        run: python -m compileall -q app.py travel_planner tests

      - name: Test
        run: python -m pytest -q

      - name: Verify committed files contain no key assignments
        shell: bash
        run: |
          if git grep -nE 'sk-[A-Za-z0-9_-]{16,}' -- ':!.env.example' ':!.streamlit/secrets.toml.example'; then
            echo "疑似提交了真实密钥"
            exit 1
          fi
